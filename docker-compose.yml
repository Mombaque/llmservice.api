version: '3.8'

services:
  llmservice-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5004
      - Jwt__Key=dev-jwt-secret-key-for-testing-only
      - Jwt__Issuer=llmservice-auth
      - Jwt__Audience=llmservice-api
      - LlmProvider__DefaultProvider=DeepSeek
      - LlmProvider__DefaultEmbeddingProvider=${LlmProvider__DefaultEmbeddingProvider:-OpenAI}
      - DeepSeek__ApiKey=${DeepSeek__ApiKey}
      - DeepSeek__DefaultModel=${DeepSeek__DefaultModel:-deepseek-chat}
      - DeepSeek__BaseUrl=${DeepSeek__BaseUrl:-https://api.deepseek.com/v1/}
      - DeepSeek__TimeoutSeconds=${DeepSeek__TimeoutSeconds:-60}
      - OpenAI__ApiKey=${OpenAI__ApiKey}
      - OpenAI__DefaultEmbeddingModel=${OpenAI__DefaultEmbeddingModel:-text-embedding-3-small}
      - OpenAI__BaseUrl=${OpenAI__BaseUrl:-https://api.openai.com/v1/}
      - OpenAI__TimeoutSeconds=${OpenAI__TimeoutSeconds:-60}
      - Resilience__RetryCount=2
      - Resilience__RetryBaseDelayMs=300
    networks:
      - backend-dev-network

networks:
  backend-dev-network:
    external: true
