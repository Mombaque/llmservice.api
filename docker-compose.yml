version: '3.8'

services:
  llmservice-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5004
      - Jwt__Key=${LLM_SERVICE_JWT_KEY}
      - Jwt__Issuer=${LLM_SERVICE_JWT_ISSUER}
      - Jwt__Audience=${LLM_SERVICE_JWT_AUDIENCE}
      - LlmProvider__DefaultProvider=${LlmProvider__DefaultProvider:-DeepSeek}
      - DeepSeek__ApiKey=${DeepSeek__ApiKey}
      - DeepSeek__DefaultModel=${DeepSeek__DefaultModel:-deepseek-chat}
      - DeepSeek__BaseUrl=${DeepSeek__BaseUrl:-https://api.deepseek.com/v1/}
      - DeepSeek__TimeoutSeconds=${DeepSeek__TimeoutSeconds:-60}
      - Resilience__RetryCount=2
      - Resilience__RetryBaseDelayMs=300
    networks:
      - backend-dev-network

networks:
  backend-dev-network:
    external: true
