services:
  - type: web
    name: llmservice-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
      - key: LlmProvider__DefaultProvider
        value: DeepSeek
      - key: LlmProvider__DefaultEmbeddingProvider
        value: OpenAI
      - key: DeepSeek__ApiKey
        sync: false
      - key: DeepSeek__DefaultModel
        value: deepseek-chat
      - key: DeepSeek__BaseUrl
        value: https://api.deepseek.com/v1/
      - key: DeepSeek__TimeoutSeconds
        value: 60
      - key: OpenAI__ApiKey
        sync: false
      - key: OpenAI__DefaultEmbeddingModel
        value: text-embedding-3-small
      - key: OpenAI__BaseUrl
        value: https://api.openai.com/v1/
      - key: OpenAI__TimeoutSeconds
        value: 60
      - key: Resilience__RetryCount
        value: 2
      - key: Resilience__RetryBaseDelayMs
        value: 300
